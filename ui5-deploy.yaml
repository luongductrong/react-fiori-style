# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: '4.0'
metadata:
  name: app.gsp26sap20.fileattachments
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
