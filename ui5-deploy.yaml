      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://s40lp1.ucc.cit.tum.de
          client: '324'
        app:
          name: ZGSP26SAP20UI
          package: YGSP26SAP20_FILE_ATTACH
          transport: S40K908842
        exclude:
          - /test/
