name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_DEPLOY_URL }}
    timeout-minutes: 15

    steps:
      - name: Checkout React repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build React app
        env:
          VITE_ODATA_ORIGIN: ${{ vars.VITE_ODATA_ORIGIN }}
          VITE_GOOGLE_APP_ID: ${{ vars.VITE_GOOGLE_APP_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Clone staging repo
        run: |
          git clone https://x-access-token:${{ secrets.STAGING_REPO_TOKEN }}@${{ vars.STAGING_REPO_URL }} staging-repo

      - name: Replace public folder with dist
        run: |
          rm -rf staging-repo/public
          mkdir -p staging-repo/public
          cp -R dist/. staging-repo/public/

      - name: Commit and push to staging repo
        working-directory: staging-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Deploy React dist from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin main
