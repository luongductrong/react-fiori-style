name: Mirror

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror repo
        run: |
          git clone --mirror https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git tmp
          cd tmp
          git push --mirror https://x-access-token:${{ secrets.ORG_REPO_TOKEN }}@${{ vars.ORG_REPO_URL }}
